id: python.queue-listener
title: Python Queue Listener (pawn-queue)
version: 1.1.0
language: python
tags:
  - queue
  - s3
  - async
  - background-jobs
applies_when:
  - Writing a background job worker using the pawn-queue library.
  - Consuming jobs from an S3-backed pawn-queue topic.
  - Publishing jobs that another pawn-queue consumer will process.
rules:
  - Build the queue with `PawnQueueBuilder().s3(...)` from configuration instead of constructing storage paths or S3 clients inside job code.
  - Open the queue with `async with await builder.build() as pq:` so pawn-queue can initialize and close its async resources cleanly.
  - Create the topic during listener startup with `await pq.create_topic(topic)` and log a warning if creation fails because the topic may already exist.
  - Register exactly one consumer in each listener process with `await pq.register_consumer(consumer_name, topics=[topic])`.
  - Start consumption with `await consumer.listen(handler)` and let pawn-queue own polling, leasing, lease refresh, and shutdown behavior.
  - Implement the handler as an async callable that accepts one pawn-queue message object and reads business data from `dict(msg.payload)`.
  - Require each payload to be a JSON object with a small routing field such as `command` and validate required command-specific fields before doing expensive work.
  - Acknowledge successful messages explicitly with `await msg.ack()` only after all durable side effects are committed.
  - Negative-ack invalid, unsupported, or failed messages explicitly with `await msg.nack()` so they move to the dead-letter area for inspection.
  - Include `msg.id`, topic, consumer name, command, and relevant domain identifiers in logs for every start, success, validation failure, and exception.
  - Catch validation and domain errors in the handler only when you can classify them, log them with context, and then ack or nack deliberately.
  - Let unexpected exceptions reach the handler failure path; never swallow exceptions in helper functions in a way that leaves a message neither acked nor nacked.
  - Make handlers idempotent because pawn-queue is at-least-once: use stable job/session identifiers, upserts, status tables, or dedupe checks around side effects.
  - Configure `visibility_timeout_seconds` longer than the slowest expected job and `lease_refresh_interval_seconds` short enough to refresh leases well before expiry.
  - Keep `max_messages_per_poll` and any local concurrency aligned with the resources the job consumes; CPU, GPU, database, and external API limits matter more than queue throughput.
  - Choose `concurrency.strategy` from configuration, default to `auto`, and only force provider-specific strategies such as `conditional_write` when the object store supports them.
  - Publish follow-up work through a registered producer with `await producer.publish(topic, payload)` instead of writing queue objects directly.
  - Store secrets and queue settings in application configuration or environment variables; never hard-code S3 credentials, bucket names, or tokens in the listener.
  - Run additional workers as separate processes, services, or containers with distinct `consumer_name` values when horizontal scaling is required.
  - Do not call pawn-queue internals or manipulate queue object prefixes directly; treat `create_topic`, `register_consumer`, `register_producer`, `listen`, `publish`, `ack`, and `nack` as the public lifecycle.
outputs:
  agents: true
  claude: true
  copilot: true
  cursor: true
